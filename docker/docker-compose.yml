# Benchmark Infrastructure for Memory Stores
# Includes: Neo4j (Graphiti/Zep), Qdrant (Mem0), Chroma (MemPalace)

version: '3.8'

services:
  # ==========================================
  # Infrastructure Services
  # ==========================================

  # Neo4j - For Graphiti and Zep temporal knowledge graphs
  neo4j:
    image: neo4j:5.15-community
    container_name: mem-benchmark-neo4j
    ports:
      - "7474:7474"  # HTTP browser
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/var/lib/neo4j/import
      - ./data/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - benchmark-network

  # Qdrant - Vector database for Mem0
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mem-benchmark-qdrant
    ports:
      - "6333:6333"  # HTTP
      - "6334:6334"  # gRPC
    volumes:
      - ./data/qdrant/storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - benchmark-network

  # ChromaDB - Vector database for MemPalace
  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: mem-benchmark-chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./data/chromadb:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - benchmark-network

  # ==========================================
  # Optional: Production Memory Services
  # ==========================================

  # Zep Server - Temporal knowledge graph service
  zep:
    image: zepai/zep:latest
    container_name: mem-benchmark-zep
    ports:
      - "8001:8000"
    environment:
      - ZEP_STORE_TYPE=postgres
      - ZEP_STORE_URL=postgresql://zep:zep@zep-postgres:5432/zep
      - ZEP_OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZEP_LLM_MODEL=gpt-4o-mini
      - ZEP_EMBEDDINGS_DIMENSION=1536
    depends_on:
      zep-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - benchmark-network
    profiles:
      - full  # Only start with: docker-compose --profile full up

  zep-postgres:
    image: postgres:15-alpine
    container_name: mem-benchmark-zep-postgres
    environment:
      - POSTGRES_USER=zep
      - POSTGRES_PASSWORD=zep
      - POSTGRES_DB=zep
    volumes:
      - ./data/zep-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zep"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - benchmark-network
    profiles:
      - full

  # ==========================================
  # Benchmark Runner
  # ==========================================

  benchmark:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mem-benchmark-runner
    volumes:
      # Mount data directories for inspection
      - ./data/results:/app/results
      - ./data/configs:/app/configs:ro
      - ../data:/app/data:ro
      # Cache for faster rebuilds
      - benchmark-cache:/root/.cache
    environment:
      # Infrastructure endpoints
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - QDRANT_URL=http://qdrant:6333
      - CHROMADB_URL=http://chromadb:8000
      - ZEP_URL=http://zep:8000
      # API Keys (pass from host env)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Benchmark configuration
      - BENCHMARK_CONFIG=${BENCHMARK_CONFIG:-default}
      - BENCHMARK_OUTPUT_DIR=/app/results
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - benchmark-network
    command: ["python", "-m", "scripts.coordinator", "--config", "/app/configs/${BENCHMARK_CONFIG:-default}.json"]
    profiles:
      - benchmark  # Run with: docker-compose --profile benchmark up

  # Interactive shell for debugging
  benchmark-shell:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mem-benchmark-shell
    volumes:
      - ./data/results:/app/results
      - ./data/configs:/app/configs
      - ../data:/app/data
      - benchmark-cache:/root/.cache
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - QDRANT_URL=http://qdrant:6333
      - CHROMADB_URL=http://chromadb:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - benchmark-network
    command: ["/bin/bash"]
    stdin_open: true
    tty: true
    profiles:
      - shell  # Run with: docker-compose --profile shell up

networks:
  benchmark-network:
    driver: bridge

volumes:
  benchmark-cache:
